<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cdn2videy</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:#fff;
    text-align:center;
    padding:30px;
}
input, button {
    padding:12px;
    margin:10px;
    width:90%;
    max-width:400px;
    border:none;
    border-radius:8px;
}
button {
    background:#3b82f6;
    color:#fff;
}
.result {
    margin-top:20px;
    background:#111;
    padding:10px;
    border-radius:8px;
    word-break:break-all;
}
.loader {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.spinner {
    border:4px solid #333;
    border-top:4px solid #fff;
    border-radius:50%;
    width:50px;
    height:50px;
    animation:spin 1s linear infinite;
}
@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h2>CDN2Videy Generator</h2>

<input type="text" id="url" placeholder="Masukkan link LP kamu">
<br>
<button onclick="generate()">Generate Link</button>

<div class="result" id="result"></div>

<div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Connecting to CDN server...</p>
</div>

<script>

// RANDOM CODE
function randomCode(length=6){
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let result = "";
    for(let i=0;i<length;i++){
        result += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    return result;
}

// GENERATE LINK
function generate(){
    let url = document.getElementById("url").value;

    if(!url){
        alert("Masukkan link dulu!");
        return;
    }

    let code = randomCode();
    let encoded = btoa(url);

    let finalLink = location.origin + "/cdn2videy/" + code + "#" + encoded;

    document.getElementById("result").innerHTML = finalLink;
}

// REDIRECT MODE
let path = window.location.pathname.split("/").pop();
let hash = window.location.hash.replace("#","");

if(path && hash){
    document.getElementById("loader").style.display = "flex";

    let target = atob(hash);

    setTimeout(()=>{
        window.location.href = target;
    },2000);
}

</script>

</body>
</html>
